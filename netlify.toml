[build]
  command = "npx tsx script/build-netlify.ts"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Use esbuild bundler — avoids zip-it-and-ship-it's supports-color scanner bug
[functions]
  node_bundler = "esbuild"

# Redirect all /api/* calls to the serverless Express function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA redirect — all routes serve index.html so wouter handles routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
